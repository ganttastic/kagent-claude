apiVersion: v1
kind: Namespace
metadata:
  name: kagent
  labels:
    app.kubernetes.io/part-of: kagent
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: anthropic-credentials
  namespace: kagent
spec:
  encryptedData:
    api-key: "REPLACE_WITH_SEALED_VALUE"
  template:
    metadata:
      name: anthropic-credentials
      namespace: kagent
    type: Opaque
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-agent
  namespace: kagent
  labels:
    app: claude-agent
    app.kubernetes.io/name: claude-agent
    app.kubernetes.io/part-of: kagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-agent
  template:
    metadata:
      labels:
        app: claude-agent
    spec:
      containers:
        - name: claude-agent
          image: ghcr.io/ganttastic/kagent-claude:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-credentials
                  key: api-key
            - name: KAGENT_URL
              value: "http://kagent-controller.kagent.svc.cluster.local:8083"
            - name: KAGENT_NAME
              value: "claude-agent"
            - name: KAGENT_NAMESPACE
              value: "kagent"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: claude-agent
  namespace: kagent
  labels:
    app: claude-agent
spec:
  selector:
    app: claude-agent
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: claude-agent
  namespace: kagent
spec:
  description: Claude-powered coding and research agent
  type: BYO
  byo:
    url: "http://claude-agent.kagent.svc.cluster.local:8080"
