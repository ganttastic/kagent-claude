# kagent-claude BYO Agent deployment
#
# The kagent controller manages the Deployment and Service for BYO agents.
# You only need to:
# 1. Ensure the kagent namespace exists (created by kagent install)
# 2. Create the Secret with your Anthropic API key
# 3. Apply the Agent CRD below
#
# Prerequisites:
#   kubectl create secret generic kagent-anthropic \
#     --namespace=kagent \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-...

---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: claude-agent
  namespace: kagent
spec:
  description: Claude-powered coding and research agent
  type: BYO
  byo:
    deployment:
      image: ghcr.io/ganttastic/kagent-claude:latest
      env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: kagent-anthropic
              key: ANTHROPIC_API_KEY
