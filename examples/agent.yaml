# Zero-code Claude agent for kagent.
#
# Uses the published golden image — no Python or Docker build needed.
# Configure everything via environment variables.
#
# Prerequisites:
#   kubectl create secret generic kagent-anthropic \
#     --namespace=kagent \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-...
#
# Deploy:
#   kubectl apply -f examples/agent.yaml
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: claude-agent
  namespace: kagent
spec:
  description: Claude-powered coding and research agent
  type: BYO
  byo:
    deployment:
      image: ghcr.io/ganttastic/kagent-claude:latest
      env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: kagent-anthropic
              key: ANTHROPIC_API_KEY

        # --- Claude SDK options ---
        - name: CLAUDE_TOOLS
          value: "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"
        # - name: CLAUDE_ALLOWED_TOOLS
        #   value: "Read,Glob,Grep"   # If unset, defaults to CLAUDE_TOOLS (all auto-approved)
        # - name: CLAUDE_MODEL
        #   value: "claude-sonnet-4-5"
        # - name: CLAUDE_FALLBACK_MODEL
        #   value: "claude-haiku-4"
        # - name: CLAUDE_SYSTEM_PROMPT
        #   value: "You are a senior engineer. Explain your reasoning."
        # - name: CLAUDE_MAX_TURNS
        #   value: "25"

        # --- Model behavior ---
        # - name: CLAUDE_EFFORT
        #   value: "high"          # low, medium, high, xhigh, max
        # - name: CLAUDE_MAX_BUDGET_USD
        #   value: "5.0"           # Cost cap per execution

        # --- Security ---
        # - name: CLAUDE_DISALLOWED_TOOLS
        #   value: ""              # e.g., "Bash,Write" for read-only agents
        # - name: CLAUDE_PERMISSION_MODE
        #   value: "default"       # default, acceptEdits, bypassPermissions, plan, dontAsk
        # - name: CLAUDE_ADD_DIRS
        #   value: ""              # e.g., "/data/shared,/mnt/datasets"
        # - name: CLAUDE_STRICT_MCP_CONFIG
        #   value: "false"         # true = ignore project .mcp.json files

        # --- MCP servers (optional) ---
        # Stdio:  {"name": {"command": "npx", "args": ["@org/server"]}}
        # HTTP:   {"name": {"type": "http", "url": "http://server/mcp"}}
        # - name: CLAUDE_MCP_SERVERS
        #   value: '{"fetch": {"type": "http", "url": "http://mcp-server/mcp"}}'

        # --- Skills (optional) ---
        # Mount SKILL.md files via ConfigMap, then enable:
        # - name: CLAUDE_SKILLS
        #   value: "true"

        # --- Executor options ---
        # - name: CLAUDE_TIMEOUT
        #   value: "300"
        # - name: CLAUDE_STREAMING
        #   value: "true"
        # - name: CLAUDE_HITL
        #   value: "false"

        # --- Agent identity ---
        # - name: AGENT_NAME
        #   value: "claude-agent"
        # - name: AGENT_DESCRIPTION
        #   value: "Claude-powered agent running on kagent"
