# Example kagent-claude BYO Agent
#
# The kagent controller creates the Deployment and Service automatically.
# You only need to:
# 1. Create the Secret with your Anthropic API key
# 2. Build and push your container image
# 3. Apply this file
#
# Prerequisites:
#   kubectl create secret generic kagent-anthropic \
#     --namespace=kagent \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-...
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: claude-agent
  namespace: kagent
spec:
  description: Claude-powered coding and research agent
  type: BYO
  byo:
    deployment:
      # Replace with your own image
      image: ghcr.io/your-org/my-claude-agent:latest
      env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: kagent-anthropic
              key: ANTHROPIC_API_KEY
