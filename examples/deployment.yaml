# Example kagent-claude BYO Agent
#
# The kagent controller manages the Deployment and Service for BYO agents.
# You only need to:
# 1. Create the Secret with your Anthropic API key
# 2. Apply the Agent CRD below
#
# Prerequisites:
#   kubectl create secret generic kagent-anthropic \
#     --namespace=kagent \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-...
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: claude-example-agent
  namespace: kagent
spec:
  description: Example Claude-powered coding agent via kagent-claude
  type: BYO
  byo:
    deployment:
      image: ghcr.io/ganttastic/kagent-claude-example:latest
      env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: kagent-anthropic
              key: ANTHROPIC_API_KEY
