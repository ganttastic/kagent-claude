apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-example-agent
  namespace: kagent
  labels:
    app: claude-example-agent
    app.kubernetes.io/name: claude-example-agent
    app.kubernetes.io/part-of: kagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-example-agent
  template:
    metadata:
      labels:
        app: claude-example-agent
    spec:
      containers:
        - name: claude-example-agent
          image: ghcr.io/ganttastic/kagent-claude-example:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kagent-anthropic
                  key: ANTHROPIC_API_KEY
            - name: KAGENT_URL
              value: "http://kagent-controller.kagent.svc.cluster.local:8083"
            - name: KAGENT_NAME
              value: "claude-example-agent"
            - name: KAGENT_NAMESPACE
              value: "kagent"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: claude-example-agent
  namespace: kagent
  labels:
    app: claude-example-agent
spec:
  selector:
    app: claude-example-agent
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: claude-example-agent
  namespace: kagent
spec:
  description: Example Claude-powered coding agent via kagent-claude
  type: BYO
  byo:
    url: "http://claude-example-agent.kagent.svc.cluster.local:8080"
