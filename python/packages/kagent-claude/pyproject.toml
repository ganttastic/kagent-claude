[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kagent-claude"
version = "0.1.0"
description = "Claude Agent SDK integration for KAgent with A2A server support"
readme = "README.md"
requires-python = ">=3.10, <3.14"
dependencies = [
  "claude-agent-sdk>=0.2.0",
  "httpx>=0.25.0",
  "fastapi>=0.100.0",
  "pydantic>=2.0.0",
  "typing-extensions>=4.0.0",
  "uvicorn>=0.20.0",
  "a2a-sdk[http-server]>=0.3.23",
  "kagent-core>=0.1.0",
  "opentelemetry-api>=1.20.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
]

[tool.uv.sources]
kagent-core = {workspace = true}

[tool.hatch.build.targets.wheel]
packages = ["src/kagent"]

[tool.ruff]
extend = "../../pyproject.toml"
